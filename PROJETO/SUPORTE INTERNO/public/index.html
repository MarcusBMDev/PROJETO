<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUROHELP - NeuroCenter</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="header-nav">
        <a href="http://192.168.10.133" class="btn-voltar-portal">
            ⬅ Voltar ao Portal
        </a>
    </div>

    <div class="container">
        <div class="card">
            <h1>NEUROHELP 🚀</h1>
            <p>Suporte Técnico e Desenvolvimento</p>
            <br>
            <form id="formChamado">
                <div class="form-group">
                    <label><i class="fa-solid fa-circle-question"></i> O que você precisa?</label>
                    <select id="tipo" onchange="mudarFormulario()" style="background: rgba(227, 242, 253, 0.8); font-weight:bold; border-color:#90caf9;">
                        <option value="suporte">🛠️ Suporte Técnico (Computador/Internet)</option>
                        <option value="projeto">💡 Novo Projeto / Sistema (Criação)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-user"></i> Solicitante (Nome):</label>
                    <input type="text" id="solicitante" placeholder="Ex: Maria (Recepção)" required>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-building"></i> Setor:</label>
                    <select id="setor" required>
                        <option value="">Selecione...</option>
                        <optgroup label="Geral">
                            <option value="Recepção">Recepção</option>
                            <option value="Administrativo">Administrativo</option>
                            <option value="Financeiro">Financeiro</option>
                            <option value="Diretoria">Diretoria</option>
                            <option value="RH">RH</option>
                        </optgroup>
                        <optgroup label="Clínico">
                            <option value="Terapeutas">Terapeutas</option>
                            <option value="Coordenação">Coordenação</option>
                            <option value="ABA">ABA</option>
                        </optgroup>
                    </select>
                </div>

                <!-- CAMPOS ESPECÍFICOS DE SUPORTE (NOVO) -->
                <div id="campos-suporte">
                    <div class="form-group">
                        <label><i class="fa-solid fa-tags"></i> Tipo de Demanda:</label>
                        <select id="categoria_demanda" onchange="mudarCategoria()" required>
                            <option value="Internet">🌐 Internet</option>
                            <option value="Computador">💻 Computador</option>
                            <option value="Impressora">🖨️ Impressora</option>
                            <option value="Outros">❓ Outros</option>
                        </select>
                    </div>

                    <div class="form-group" id="campo-outros" style="display:none;">
                        <label><i class="fa-solid fa-pen-to-square"></i> Detalhe a Demanda:</label>
                        <textarea id="detalhes_outros" placeholder="Fale mais sobre o que está acontecendo..."></textarea>
                    </div>

                    <div class="form-group">
                        <label><i class="fa-solid fa-laptop-code"></i> Software/Programa (Falha)</label>
                        <input type="text" id="software" placeholder="Ex: Word, Chrome, Sistema... (Opcional)">
                    </div>
                </div>

                <!-- CAMPOS ESPECÍFICOS DE PROJETO -->
                <div id="campos-projeto" style="display:none;">
                    <div class="form-group">
                        <label><i class="fa-solid fa-bullseye"></i> Objetivo Principal:</label>
                        <textarea id="objetivo" placeholder="O que esse sistema/automação deve resolver?"></textarea>
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-calendar-alt"></i> Prazo Desejado:</label>
                        <input type="date" id="prazo_desejado">
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-chart-line"></i> Impacto Esperado:</label>
                        <textarea id="impacto_esperado" placeholder="Quais melhorias/economia isso trará?"></textarea>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-triangle-exclamation"></i> Urgência:</label>
                    <select id="urgencia">
                        <option value="critica">🔴 Imediato (Parou tudo)</option>
                        <option value="alta">🟡 Alta (Até 60 min)</option>
                        <option value="media">🟢 Normal (Até 2 horas)</option>
                        <option value="baixa">🔵 Baixa/Agendado (Até 4 horas)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-align-left"></i> Descrição Detalhada:</label>
                    <textarea id="descricao" required placeholder="Descreva o problema com detalhes..."></textarea>
                </div>

                <div class="form-group" id="grupo-testes">
                    <label id="lblTestes"><i class="fa-solid fa-vial"></i> Testes Realizados:</label>
                    <div>
                        <label class="checkbox-label">
                            <input type="checkbox" name="checkTeste" value="Reiniciou PC"> Reiniciei o computador
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="checkTeste" value="Verificou Cabos"> Verifiquei se os cabos estão conectados
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="checkTeste" value="Relogou Sistema"> Sai e entrei novamente no sistema
                        </label>
                        <input type="text" id="testes_outros" placeholder="Outro teste? (Opcional)" style="margin-top:5px; font-size:0.85rem; padding:8px;">
                    </div>
                </div>

                <button type="submit" class="btn-submit">🚀 Enviar Solicitação</button>
            </form>
        </div>

        <div class="card">
            <h1>Acompanhamento ⏳</h1>
            <p>Fila em tempo real</p>
            <br>
            <div id="fila" class="fila-lista">
                <p style="text-align:center; color:#999;">Carregando...</p>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>

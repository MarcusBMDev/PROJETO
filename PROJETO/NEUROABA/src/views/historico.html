<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Sessões - NeuroABA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #e2e8f0; padding: 15px 10px; text-align: left; }
        th { background-color: #f8fafc; color: #475569; font-weight: 600; }
        
        .btn-editar { background-color: #f59e0b; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; }
        .btn-editar:hover { background-color: #d97706; }
    </style>
</head>
<body>

    <div class="container">
        <nav style="background-color: #1e293b; padding: 15px 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <div style="color: white; font-weight: 700; font-size: 20px;">✨ NeuroABA</div>
            <div style="display: flex; gap: 20px;">
                <a href="index.html" style="color: #cbd5e1; text-decoration: none; font-weight: 500;">Nova Avaliação</a>
                <a href="dashboard.html" style="color: #cbd5e1; text-decoration: none; font-weight: 500;">Curva ABA</a>
                <a href="historico.html" style="color: white; text-decoration: none; font-weight: 500;">Histórico</a>
                <button onclick="sair()" style="background-color: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer;">Sair</button>
            </div>
        </nav>

        <div class="card">
            <h2 style="margin-top: 0;">📋 Histórico de Avaliações</h2>
            <p style="color: #64748b;">Visualize e corrija avaliações anteriores.</p>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Data da Sessão</th>
                        <th>Paciente</th>
                        <th>Terapeuta (AT)</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaHistorico">
                    <tr><td colspan="5" style="text-align: center;">Carregando histórico...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/historico.js"></script>
</body>
</html>

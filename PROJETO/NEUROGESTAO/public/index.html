<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><title>Neuro Gestão - Acesso Seguro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/neurogestao.css">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.6s ease-out; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6 bg-slate-900/80">
    
    <div class="w-full max-w-md bg-white/10 backdrop-blur-xl rounded-[2.5rem] shadow-2xl p-10 border border-white/20 animate-fade">
        <div class="text-center mb-10">
            <div class="w-20 h-20 bg-gradient-to-tr from-blue-600 to-purple-600 rounded-3xl mx-auto flex items-center justify-center mb-6 shadow-lg shadow-blue-500/30">
                <span class="text-4xl">🧠</span>
            </div>
            <h2 class="text-3xl font-black text-white tracking-tight">Neuro <span class="text-blue-400">Gestão</span></h2>
            <p class="text-xs font-black uppercase tracking-widest text-slate-400 mt-2">Plataforma Estratégica</p>
        </div>
        
        <div class="space-y-5">
            <div>
                <label class="block text-[10px] font-black uppercase text-slate-400 mb-2 ml-2">Usuário de Acesso</label>
                <input type="text" id="username" class="w-full px-5 py-4 bg-white/5 border border-white/10 rounded-2xl text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all font-bold" placeholder="Digite seu usuário">
            </div>
            <div>
                <label class="block text-[10px] font-black uppercase text-slate-400 mb-2 ml-2">Chave de Segurança</label>
                <input type="password" id="password" onkeypress="if(event.key === 'Enter') fazerLogin()" class="w-full px-5 py-4 bg-white/5 border border-white/10 rounded-2xl text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all font-bold" placeholder="Digite sua senha">
            </div>
            
            <div id="mensagem-erro" class="hidden bg-red-500/20 text-red-400 text-xs font-bold p-4 rounded-xl text-center border border-red-500/30"></div>
            
            <button onclick="fazerLogin()" class="w-full py-4 bg-gradient-to-r from-blue-600 to-blue-700 text-white rounded-2xl font-black uppercase tracking-wider text-sm shadow-lg shadow-blue-600/30 hover:shadow-blue-600/50 hover:-translate-y-0.5 transition-all mt-4">
                Autenticar
            </button>
        </div>
    </div>

    <script>
        async function fazerLogin() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    const msg = document.getElementById('mensagem-erro');
    
    try {
        const res = await fetch('/login', { // Usando rota relativa
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user, password: pass })
        });
        const dados = await res.json();

        if (res.ok && dados.autenticado) {
            // Salva o nível de acesso para usar nas outras telas
            localStorage.setItem('setor', dados.usuario.departamento);
            localStorage.setItem('userId', dados.usuario.id);
            localStorage.setItem('userName', dados.usuario.nome);
            localStorage.setItem('is_super_admin', dados.usuario.is_super_admin);
            window.location.href = "/dashboard"; // Redireciona via rota do Rails
        } else {
            msg.innerText = dados.erro;
            msg.classList.remove('hidden');
        }
    } catch (e) {
        msg.innerText = "Erro: O servidor Rails (3011) está desligado.";
        msg.classList.remove('hidden');
    }
}
    </script>
</body>
</html>

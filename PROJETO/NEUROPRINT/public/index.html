<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" href="https://img.icons8.com/color/48/000000/print.png" type="image/png">
    <meta charset="UTF-8">
    <title>Nova Impressão - NeuroPrint</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>🖨️ Nova Impressão</h2>
                <div>
                    <a href="http://192.168.10.133" style="color: #0d6efd; text-decoration: none; margin-right: 15px; font-weight: bold;">
                        🏠 Portal
                    </a>
                    <a href="#" onclick="logout()" style="color: red; text-decoration: none;">
                        Sair
                    </a>
                </div>
            </div>
            
            <div id="welcomeMsg" class="subtitle"></div>
            <button id="btnAdmin" class="secondary hidden" onclick="window.location.href='admin.html'">⚙️ Acessar Painel Admin</button>
            <br><br>

            <form id="printForm">
                <input type="hidden" name="user_id" id="userId">
                
                <div class="form-group" style="background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #dee2e6; margin-bottom: 20px;">
                    <label style="font-weight: bold; color: #333;">📍 Setor / Especialidade (Obrigatório):</label>
                    <select name="sector" id="sectorSelect" required style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; font-size: 1rem;">
                        <option value="" disabled selected>Selecione o setor...</option>
                        <option value="Neuropsicopedagogia">Neuropsicopedagogia (Cota: 300)</option>
                        <option value="Equipe ABA">Equipe ABA (Cota: 200)</option>
                        <option value="Psicologia">Psicologia (Cota: 50)</option>
                        <option value="Fonoterapia">Fonoterapia (Cota: 150)</option>
                        <option value="Terapia Ocupacional">Terapia Ocupacional (Cota: 150)</option>
                        <option value="Musicoterapia">Musicoterapia (Cota: 50)</option>
                        <option value="Psicomotricidade">Psicomotricidade (Cota: 50)</option>
                        <option value="Coordenação">Coordenação (Cota: 50)</option>
                        <option value="Outros">Outros (Sem Cota)</option>
                    </select>

                    <div id="quotaInfo" style="margin-top: 10px; padding: 10px; border-radius: 5px; display: none; font-size: 0.9rem;">
                        <!-- Preenchido via JS -->
                    </div>
                </div>

                <div class="form-group">
                     <label>Arquivos (PDF):</label>
    
                    <div id="file-inputs-container">
                    <div class="file-row" style="margin-bottom: 10px;">
                    <input type="file" name="files" required accept=".pdf">
                </div>
            </div>

    <button type="button" onclick="addFileInput()" style="background-color: #6c757d; font-size: 0.9rem; padding: 5px 10px; margin-top: 5px;">
        ➕ Adicionar outro PDF
    </button>
</div>

                <div style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Páginas:</label>
                        <input type="text" name="page_range" placeholder="Ex: Todas, 1-3">
                    </div>
                    <div class="form-group" style="width: 100px;">
                        <label>Cópias:</label>
                        <input type="number" name="copies" value="1" min="1">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Modo:</label>
                        <select name="color_mode">
                            <option value="PB">Preto e Branco</option>
                            <option value="Colorida">Colorida</option>
                        </select>
                    </div>
                </div>

                <div style="display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap;">
                    <label class="toggle-container duplex" style="flex: 1; min-width: 140px;">
                        <input type="checkbox" name="is_duplex">
                        <span class="slider"></span>
                        <span style="font-weight: bold; font-size: 0.9rem;">📄 Frente e Verso</span>
                    </label>

                    <label class="toggle-container" style="flex: 1; min-width: 140px; background: #e7f3ff; border: 1px solid #b3d7ff;">
                        <input type="checkbox" name="two_per_page">
                        <span class="slider"></span>
                        <span style="font-weight: bold; font-size: 0.9rem; color: #0056b3;">🌓 2 Pág/Folha</span>
                    </label>

                    <label class="toggle-container urgent" style="flex: 1; min-width: 140px;">
                        <input type="checkbox" name="is_urgent">
                        <span class="slider"></span>
                        <span style="font-weight: bold; font-size: 0.9rem; color: #dc3545;">🔥 Urgente</span>
                    </label>
                </div>

                <div class="form-group">
                    <label>Precisa para quando? (Data/Hora)</label>
                    <input type="datetime-local" name="deadline">
                </div>

                <div class="form-group">
                    <label>Observações:</label>
                    <textarea name="observacao" rows="2" placeholder="Ex: Papel especial, encadernação..."></textarea>
                </div>
                <button type="submit">Enviar Solicitação</button>
            </form>
        </div>

        <div class="mt-5" style="margin-top: 30px;">
            <h3>Meus Pedidos Recentes</h3>
            <table class="table" style="width:100%; background:white; border-radius:8px; padding:10px;">
                <thead>
                    <tr style="text-align:left;"><th>Arquivo(s)</th><th>Status</th></tr>
                </thead>
                <tbody id="my-requests-list"></tbody>
            </table>
        </div>
    </div>

    <script>
        const userData = JSON.parse(localStorage.getItem('neuroUser'));
        
        // Se não tiver logado, manda pro login
        if (!userData) window.location.href = 'login.html';

        // Preenche dados iniciais
        document.getElementById('userId').value = userData.id;
        document.getElementById('welcomeMsg').innerText = `Olá, ${userData.username}`;
        
        // Botão Admin (só aparece se for admin)
        if (userData.isAdmin) {
            document.getElementById('btnAdmin').classList.remove('hidden');
        }

        function logout() { 
            localStorage.removeItem('neuroUser'); 
            window.location.href = 'login.html'; 
        }

        // --- FUNÇÃO QUE BUSCA OS PEDIDOS ---
        async function loadMyRequests() {
            try {
                // Adicionei um timestamp na URL (?t=...) para evitar que o navegador use cache antigo
                const res = await fetch(`/api/print/my-requests?user_id=${userData.id}&t=${new Date().getTime()}`);
                const data = await res.json();
                
                const list = document.getElementById('my-requests-list');
                list.innerHTML = '';

                if(data.length === 0) {
                    list.innerHTML = '<tr><td colspan="2" style="text-align:center; color:#999;">Nenhum pedido recente.</td></tr>';
                    return;
                }

                data.forEach(req => {
                    // Configuração Visual dos Status
                    let icon = '🕒'; 
                    let label = 'Pendente'; 
                    let cor = '#f0ad4e'; // Laranja
                    let bg = '#fff8e1';

                    // Verifica exatamente como está escrito no banco
                    if(req.status === 'em_andamento') { 
                        icon = '🖨️'; 
                        label = 'Imprimindo'; 
                        cor = '#0275d8'; // Azul
                        bg = '#e0f2f1';
                    }
                    if(req.status === 'impresso') { 
                        icon = '✅'; 
                        label = 'Pronto'; 
                        cor = '#198754'; // Verde
                        bg = '#e8f5e9';
                    }
                    if(req.status === 'cancelado') { 
                        icon = '❌'; 
                        label = 'Cancelado'; 
                        cor = '#6c757d'; // Cinza
                        bg = '#f8f9fa';
                    }

                    // Formata lista de arquivos
                    const arquivos = req.file_name ? req.file_name.split(';').join(', ') : 'Arquivo';
                    const infoPaginas = req.total_pages > 0 ? `<br><small style="color:#666;">📄 ${req.total_pages} pág(s) x ${req.copies || 1} cópia(s) = <b>${req.total_printed} impressões</b></small>` : '';

                    list.innerHTML += `
                        <tr style="border-bottom:1px solid #eee;">
                            <td style="padding:12px;">
                                <div style="font-weight:600; color:#444;">${arquivos}</div>
                                <div style="font-size:0.8rem; color:#888;">#${req.id} - ${new Date(req.created_at).toLocaleDateString('pt-BR')} ${infoPaginas}</div>
                            </td>
                            <td style="padding:12px; text-align:right;">
                                <span style="background:${bg}; color:${cor}; padding:5px 10px; border-radius:15px; font-weight:bold; font-size:0.85rem; display:inline-block;">
                                    ${icon} ${label}
                                </span>
                            </td>
                        </tr>
                    `;
                });
            } catch (e) { 
                console.error("Erro ao atualizar lista:", e); 
            }
        }

        // --- ENVIO DO FORMULÁRIO ---
        document.getElementById('printForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            
            // Feedback visual de carregamento
            btn.disabled = true;
            btn.innerText = 'Enviando... ⏳';

            const formData = new FormData(e.target);
            try {
                const res = await fetch('/api/print/request', {
                    method: 'POST', 
                    body: formData, 
                    headers: { 'user-id': userData.id } 
                });
                
                const result = await res.json();

                if (res.ok) {
                    // Sucesso
                    alert('✅ Solicitação enviada!');
                    e.target.reset();
                    loadMyRequests(); // Atualiza a lista imediatamente
                } else {
                    alert('❌ Erro: ' + (result.error || 'Falha desconhecida'));
                }
            } catch (error) { 
                alert('Erro de conexão com o servidor.'); 
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        });

        // --- INICIALIZAÇÃO ---
        loadMyRequests(); // Carrega ao abrir
        
        // ATUALIZAÇÃO AUTOMÁTICA
        setInterval(loadMyRequests, 5000); 

        // --- LÓGICA DE COTA EM TEMPO REAL ---
        document.getElementById('sectorSelect').addEventListener('change', async (e) => {
            const sector = e.target.value;
            const infoDiv = document.getElementById('quotaInfo');
            
            if (!sector || sector === 'Outros') {
                infoDiv.style.display = 'none';
                return;
            }

            try {
                const res = await fetch(`/api/print/quota/${sector}`);
                const data = await res.json();
                
                infoDiv.style.display = 'block';
                
                if (data.limit > 0) {
                    const percent = Math.min(100, (data.used / data.limit) * 100);
                    let color = '#28a745'; // Verde
                    if (percent > 70) color = '#ffc107'; // Amarelo
                    if (percent >= 100) color = '#dc3545'; // Vermelho

                    infoDiv.style.backgroundColor = color === '#dc3545' ? '#f8d7da' : '#e7f3ff';
                    infoDiv.style.border = `1px solid ${color}`;
                    
                    infoDiv.innerHTML = `
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                            <span><b>Consumo do Setor:</b> ${data.used} / ${data.limit} págs</span>
                            <span>${percent.toFixed(0)}%</span>
                        </div>
                        <div style="background:#eee; height:8px; border-radius:4px; overflow:hidden;">
                            <div style="background:${color}; height:100%; width:${percent}%;"></div>
                        </div>
                        ${percent >= 100 && !userData.isAdmin ? `<p style="color:#d9534f; margin-top:5px; font-weight:bold;">⚠️ Limite atingido! Apenas administradores poderão imprimir.</p>` : ''}
                    `;
                } else {
                    infoDiv.style.backgroundColor = '#e2e3e5';
                    infoDiv.style.border = '1px solid #6c757d';
                    infoDiv.innerHTML = `<b>Setor:</b> ${sector} | <b>Consumo:</b> ${data.used} págs (Sem limite)`;
                }
            } catch (err) {
                console.error("Erro ao carregar cota:", err);
            }
        });

// --- FUNÇÃO PARA ADICIONAR CAMPOS DE ARQUIVO (Versão Corrigida) ---
function addFileInput() {
    const container = document.getElementById('file-inputs-container');
    const inputCount = container.querySelectorAll('input[type="file"]').length;

    if (inputCount >= 10) {
        alert('⚠️ Limite máximo de 10 arquivos por solicitação atingido.');
        return;
    }
    
    // Cria uma nova div para agrupar o input e o botão de remover
    const newRow = document.createElement('div');
    newRow.className = 'file-row added-dynamically'; 

    // ESTILOS IMPORTANTES PARA EVITAR SOBREPOSIÇÃO
    newRow.style.display = 'flex';
    newRow.style.alignItems = 'center';
    newRow.style.gap = '10px';
    newRow.style.marginBottom = '15px'; 
    newRow.style.padding = '5px';       
    newRow.style.backgroundColor = '#f8f9fa'; 
    newRow.style.borderRadius = '4px';
    newRow.style.width = '100%'; 
    newRow.style.boxSizing = 'border-box'; 

    // Cria o novo input
    const input = document.createElement('input');
    input.type = 'file';
    input.name = 'files';
    input.accept = '.pdf';
    input.required = true;
    input.style.flex = '1';
    input.style.width = '0'; 

    // Cria o botão de remover (X)
    const removeBtn = document.createElement('button');
    removeBtn.type = 'button';
    removeBtn.innerHTML = '&#10006;'; 
    removeBtn.style.background = '#ffdddd';
    removeBtn.style.border = '1px solid red';
    removeBtn.style.borderRadius = '50%';
    removeBtn.style.width = '25px';
    removeBtn.style.height = '25px';
    removeBtn.style.display = 'flex';
    removeBtn.style.justifyContent = 'center';
    removeBtn.style.alignItems = 'center';
    removeBtn.style.cursor = 'pointer';
    removeBtn.style.color = 'red';
    removeBtn.style.fontSize = '0.8rem';
    removeBtn.title = 'Remover este arquivo';
    
    // Ação de remover a linha
    removeBtn.onclick = function() {
        container.removeChild(newRow);
    };

    // Junta tudo
    newRow.appendChild(input);
    newRow.appendChild(removeBtn);
    container.appendChild(newRow);
}

    </script>
</body>
</html>

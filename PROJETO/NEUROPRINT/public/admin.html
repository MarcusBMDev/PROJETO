<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" href="https://img.icons8.com/color/48/000000/print.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroPrint - Gestão de Impressões</title>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="admin-body">
    
    <div class="navbar">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div style="font-size: 1.8rem;">🖨️</div>
            <div>
                <h1 style="margin: 0; font-size: 1.2rem; color: #333;">NeuroPrint Gestão</h1>
                <span id="adminName" style="color: #888; font-size: 0.75rem; font-weight: 500;">...</span>
            </div>
        </div>
        <div style="display: flex; gap: 15px;">
            <a href="http://192.168.10.133" style="text-decoration: none; color: var(--primary); font-weight: 600; font-size: 0.9rem;">
                <i class="fa-solid fa-house"></i> Portal
            </a>
            <a href="index.html" style="text-decoration: none; color: var(--success); font-weight: 600; font-size: 0.9rem;">
                <i class="fa-solid fa-plus-circle"></i> Novo Pedido
            </a>
            <a href="#" onclick="openManualCopyModal()" style="text-decoration: none; color: #ff9800; font-weight: 600; font-size: 0.9rem; padding-left: 15px; border-left: 1px solid #ddd;">
                <i class="fa-solid fa-copy"></i> Cópia Manual
            </a>
            <a href="#" onclick="logout()" style="text-decoration: none; color: var(--danger); font-weight: 600; font-size: 0.9rem; padding-left: 15px; border-left: 1px solid #ddd;">
                <i class="fa-solid fa-right-from-bracket"></i> Sair
            </a>
        </div>
    </div>

    <div class="container-wide">
        <div style="display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;">
            <div class="card" style="flex: 1.5; padding: 20px; min-width: 300px;">
                <h4 style="margin-bottom: 15px; font-size: 0.9rem; color: #555;"><i class="fa-solid fa-chart-pie"></i> Pedidos por Setor</h4>
                <canvas id="chartSetor" style="max-height: 180px;"></canvas>
            </div>
            <div class="card" style="flex: 1.5; padding: 20px; min-width: 300px;">
                <h4 style="margin-bottom: 15px; font-size: 0.9rem; color: #555;"><i class="fa-solid fa-users"></i> Top Solicitantes</h4>
                <canvas id="chartUsuario" style="max-height: 180px;"></canvas>
            </div>
            <div class="card quota-container" style="flex: 1; padding: 20px; min-width: 250px; justify-content: center;">
                <h4 style="margin: 0; font-size: 0.9rem; color: #555;"><i class="fa-solid fa-gauge-high"></i> Cota de Impressão</h4>
                <div class="quota-bar-wrapper">
                    <div id="quotaBar" class="quota-bar"></div>
                </div>
                <div style="display: flex; justify-content: space-between; font-weight: 700; font-size: 0.9rem;">
                    <span id="quotaText">0 / 1000</span>
                    <span id="quotaPercent" style="color: var(--primary);">0%</span>
                </div>
                <p style="font-size: 0.7rem; color: #999; margin: 0;">*Considera pedidos concluídos e em andamento.</p>
            </div>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; overflow-x: auto;">
            <button class="tab-btn active" data-status="todos" onclick="mudarTab('todos')">Todos</button>
            <button class="tab-btn" data-status="pendente" onclick="mudarTab('pendente')">Pendentes</button>
            <button class="tab-btn" data-status="em_andamento" onclick="mudarTab('em_andamento')">Em Andamento</button>
            <button class="tab-btn" data-status="impresso" onclick="mudarTab('impresso')">Concluídos</button>
            <button class="tab-btn" data-status="cancelado" onclick="mudarTab('cancelado')">Cancelados</button>
        </div>

        <div class="filter-section" style="margin-top: 0;">
            <div class="filter-group">
                <label>Data Início</label>
                <input type="date" id="filterStartDate">
            </div>
            <div class="filter-group">
                <label>Data Fim</label>
                <input type="date" id="filterEndDate">
            </div>
            <button class="btn-filter" onclick="carregarTudo()">
                <i class="fa-solid fa-sync"></i> Atualizar
            </button>
            <button class="btn-excel" onclick="baixarExcel()">
                <i class="fa-solid fa-file-excel"></i> Relatório
            </button>
        </div>

        <div class="card" style="padding: 0; overflow: hidden; border: 1px solid #eee;">
            <div style="padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin: 0; font-size: 1rem; color: #444;"><i class="fa-solid fa-list-ul"></i> Fila de Pedidos</h3>
                <button onclick="carregarTudo()" style="width: auto; padding: 8px 15px; font-size: 0.8rem; background: #f8f9fa; color: #666; border: 1px solid #ddd;">
                    <i class="fa-solid fa-rotate"></i> Atualizar
                </button>
            </div>
            
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th width="5%">ID</th>
                            <th width="18%">Solicitante</th>
                            <th width="20%">Conteúdo</th>
                            <th width="15%">Detalhes</th>
                            <th width="15%">Prazos</th>
                            <th width="15%">Observações</th>
                            <th width="12%">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaPedidos"></tbody>
                </table>
            </div>
            <div id="paginationContainer" style="padding: 15px; border-top: 1px solid #eee; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;"></div>
        </div>
    </div>

    <!-- Modal para Cópia Manual -->
    <div id="manualCopyModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999;">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; width: 400px; max-width: 90%; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 10000; box-sizing: border-box;">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px;">
                <h3 style="margin: 0; color: #333;"><i class="fa-solid fa-copy"></i> Registrar Cópia Manual</h3>
                <button onclick="closeManualCopyModal()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #999;">&times;</button>
            </div>
            
            <form id="manualCopyForm">
                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="font-weight: 600; font-size: 0.9rem; margin-bottom: 5px; display: block;">📍 Setor:</label>
                    <select id="manualCopySector" required style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                        <option value="" disabled selected>Selecione o setor...</option>
                        <option value="Neuropsicopedagogia">Neuropsicopedagogia</option>
                        <option value="Equipe ABA">Equipe ABA</option>
                        <option value="Psicologia">Psicologia</option>
                        <option value="Fonoterapia">Fonoterapia</option>
                        <option value="Terapia Ocupacional">Terapia Ocupacional</option>
                        <option value="Musicoterapia">Musicoterapia</option>
                        <option value="Psicomotricidade">Psicomotricidade</option>
                        <option value="Coordenação">Coordenação</option>
                    </select>
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="font-weight: 600; font-size: 0.9rem; margin-bottom: 5px; display: block;">📄 Quantidade de Páginas:</label>
                    <input type="number" id="manualCopyAmount" required min="1" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                </div>

                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="font-weight: 600; font-size: 0.9rem; margin-bottom: 5px; display: block;">📝 Observação (Opcional):</label>
                    <textarea id="manualCopyObs" rows="2" placeholder="Ex: Cópias para recepção..." style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-family: inherit;"></textarea>
                </div>

                <div style="display: flex; gap: 10px;">
                    <button type="button" class="btn-cancel" style="flex: 1; padding: 10px; background: #f8f9fa; border: 1px solid #ddd; border-radius: 5px; cursor: pointer;" onclick="closeManualCopyModal()">Cancelar</button>
                    <button type="submit" style="flex: 1; padding: 10px; background: var(--success); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Salvar Registro</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/admin.js?v=2"></script>
</body>
</html>

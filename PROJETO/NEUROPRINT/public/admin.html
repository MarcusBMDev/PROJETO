<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" href="https://img.icons8.com/color/48/000000/print.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroPrint - Gestão de Impressões</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding-top: 20px;
        }

        .navbar {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            margin-bottom: 20px;
            padding: 15px 30px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 95%;
            max-width: 1200px;
        }

        .filter-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
            min-width: 150px;
        }

        .filter-group label {
            font-size: 0.85rem;
            color: #777;
        }

        .filter-group input, .filter-group select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .btn-filter {
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            width: auto;
        }

        .btn-excel {
            background: var(--success);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            width: auto;
        }

        .stat-card {
            border-left: 5px solid var(--primary);
        }

        .quota-container {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid #eee;
        }

        .quota-bar-wrapper {
            background: #e9ecef;
            border-radius: 8px;
            height: 20px;
            overflow: hidden;
            position: relative;
        }

        .quota-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #198754, #ffc107);
            transition: width 0.5s ease-in-out;
        }

        .table-responsive {
            overflow-x: auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        table {
            font-size: 0.85rem;
        }

        .info-sub { font-size: 0.75rem; color: #888; }
        .obs-text { font-style: italic; color: #666; background: #fffcf0; padding: 4px 8px; border-radius: 6px; border: 1px solid #ffeeba; }
        .deadline-badge { color: #dc3545; font-weight: 600; font-size: 0.75rem; }

        /* Tabs Styling */
        .tab-btn {
            background: none;
            border: none;
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #777;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }

        .tab-btn:hover { color: var(--primary); }
        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .status-tag.status-cancelado { background: #6c757d; color: white; }
        .btn-cancel {
            background: #6c757d;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 0.75rem;
            margin-top: 5px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn-cancel:hover { background: #5a6268; }
    </style>
</head>
<body>
    
    <div class="navbar">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div style="font-size: 1.8rem;">🖨️</div>
            <div>
                <h1 style="margin: 0; font-size: 1.2rem; color: #333;">NeuroPrint Gestão</h1>
                <span id="adminName" style="color: #888; font-size: 0.75rem; font-weight: 500;">...</span>
            </div>
        </div>
        <div style="display: flex; gap: 15px;">
            <a href="http://192.168.10.133" style="text-decoration: none; color: var(--primary); font-weight: 600; font-size: 0.9rem;">
                <i class="fa-solid fa-house"></i> Portal
            </a>
            <a href="index.html" style="text-decoration: none; color: var(--success); font-weight: 600; font-size: 0.9rem;">
                <i class="fa-solid fa-plus-circle"></i> Novo Pedido
            </a>
            <a href="#" onclick="logout()" style="text-decoration: none; color: var(--danger); font-weight: 600; font-size: 0.9rem; padding-left: 15px; border-left: 1px solid #ddd;">
                <i class="fa-solid fa-right-from-bracket"></i> Sair
            </a>
        </div>
    </div>

    <div class="container-wide">
        <!-- Dashboard / Stats Row -->
        <div style="display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;">
            <div class="card" style="flex: 1.5; padding: 20px; min-width: 300px;">
                <h4 style="margin-bottom: 15px; font-size: 0.9rem; color: #555;"><i class="fa-solid fa-chart-pie"></i> Pedidos por Setor</h4>
                <canvas id="chartSetor" style="max-height: 180px;"></canvas>
            </div>
            <div class="card" style="flex: 1.5; padding: 20px; min-width: 300px;">
                <h4 style="margin-bottom: 15px; font-size: 0.9rem; color: #555;"><i class="fa-solid fa-users"></i> Top Solicitantes</h4>
                <canvas id="chartUsuario" style="max-height: 180px;"></canvas>
            </div>
            <div class="card quota-container" style="flex: 1; padding: 20px; min-width: 250px; justify-content: center;">
                <h4 style="margin: 0; font-size: 0.9rem; color: #555;"><i class="fa-solid fa-gauge-high"></i> Cota de Impressão</h4>
                <div class="quota-bar-wrapper">
                    <div id="quotaBar" class="quota-bar"></div>
                </div>
                <div style="display: flex; justify-content: space-between; font-weight: 700; font-size: 0.9rem;">
                    <span id="quotaText">0 / 1000</span>
                    <span id="quotaPercent" style="color: var(--primary);">0%</span>
                </div>
                <p style="font-size: 0.7rem; color: #999; margin: 0;">*Considera pedidos concluídos e em andamento.</p>
            </div>
        </div>

        <!-- Status Tabs (Clean UI) -->
        <div style="display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; overflow-x: auto;">
            <button class="tab-btn active" data-status="todos" onclick="mudarTab('todos')">Todos</button>
            <button class="tab-btn" data-status="pendente" onclick="mudarTab('pendente')">Pendentes</button>
            <button class="tab-btn" data-status="em_andamento" onclick="mudarTab('em_andamento')">Em Andamento</button>
            <button class="tab-btn" data-status="impresso" onclick="mudarTab('impresso')">Concluídos</button>
            <button class="tab-btn" data-status="cancelado" onclick="mudarTab('cancelado')">Cancelados</button>
        </div>

        <!-- Filter Bar (Dates and Search) -->
        <div class="filter-section" style="margin-top: 0;">
            <div class="filter-group">
                <label>Data Início</label>
                <input type="date" id="filterStartDate">
            </div>
            <div class="filter-group">
                <label>Data Fim</label>
                <input type="date" id="filterEndDate">
            </div>
            <button class="btn-filter" onclick="carregarTudo()">
                <i class="fa-solid fa-sync"></i> Atualizar
            </button>
            <button class="btn-excel" onclick="baixarExcel()">
                <i class="fa-solid fa-file-excel"></i> Relatório
            </button>
        </div>

        <!-- Main Content -->
        <div class="card" style="padding: 0; overflow: hidden; border: 1px solid #eee;">
            <div style="padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin: 0; font-size: 1rem; color: #444;"><i class="fa-solid fa-list-ul"></i> Fila de Pedidos</h3>
                <button onclick="carregarTudo()" style="width: auto; padding: 8px 15px; font-size: 0.8rem; background: #f8f9fa; color: #666; border: 1px solid #ddd;">
                    <i class="fa-solid fa-rotate"></i> Atualizar
                </button>
            </div>
            
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th width="5%">ID</th>
                            <th width="18%">Solicitante</th>
                            <th width="22%">Conteúdo</th>
                            <th width="15%">Detalhes</th>
                            <th width="15%">Prazos</th>
                            <th width="15%">Observações</th>
                            <th width="10%">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaPedidos"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const userData = JSON.parse(localStorage.getItem('neuroUser'));
        if (!userData || !userData.isAdmin) window.location.href = 'index.html';
        document.getElementById('adminName').innerText = `Gestor Especialista: ${userData.username}`;

        function logout() { 
            localStorage.removeItem('neuroUser'); 
            window.location.href = 'login.html'; 
        }

        let currentTab = 'todos';

        async function mudarTab(status) {
            currentTab = status;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.status === status);
            });
            carregarTudo();
        }

        async function carregarTudo() {
            carregarPedidos();
            carregarGraficos();
        }

        async function carregarPedidos() {
            const start = document.getElementById('filterStartDate').value;
            const end = document.getElementById('filterEndDate').value;
            
            const params = new URLSearchParams({ status: currentTab, start_date: start, end_date: end });

            try {
                const res = await fetch(`/api/print/jobs?${params}`, { 
                    headers: { 'user-id': userData.id } 
                });
                const lista = await res.json();
                const tbody = document.getElementById('tabelaPedidos');
                tbody.innerHTML = '';

                lista.forEach(job => {
                    const tr = document.createElement('tr');
                    if (job.is_urgent) tr.classList.add('urgent-row');

                    const nomes = job.file_name.split(';');
                    const caminhos = job.file_path.split(';');
                    let htmlArquivos = '';
                    nomes.forEach((nome, index) => {
                        let pathRaw = caminhos[index] || '';
                        let cleanFilename = pathRaw.includes('\\') ? pathRaw.split('\\').pop() : pathRaw;
                        htmlArquivos += `<a href="/files/${cleanFilename}" target="_blank" style="display:block; text-decoration:none; color:var(--primary); font-weight:500; margin-bottom:4px; font-size:0.8rem;">
                            <i class="fa-solid fa-file-pdf"></i> ${nome.trim()}
                        </a>`;
                    });

                    const dataCriacao = new Date(job.created_at).toLocaleDateString('pt-BR');
                    let prazoHtml = `<span class="info-sub"><i class="fa-regular fa-calendar"></i> ${dataCriacao}</span>`;
                    
                    if (job.deadline) {
                        const dataPrazo = new Date(job.deadline);
                        prazoHtml += `<br><span class="deadline-badge">⚠️ ${dataPrazo.toLocaleDateString('pt-BR')} ${dataPrazo.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})}</span>`;
                    }

                    let statusClass = 'pendente';
                    let statusLabel = 'Pendente';
                    let botao = '';

                    if (job.status === 'em_andamento') { statusClass = 'em_andamento'; statusLabel = 'Imprimindo'; }
                    if (job.status === 'impresso') { statusClass = 'impresso'; statusLabel = 'Concluído'; }
                    if (job.status === 'cancelado') { statusClass = 'cancelado'; statusLabel = 'Cancelado'; }

                    if (job.status === 'pendente' || !job.status) {
                        botao = `
                            <button class="btn-action" style="background:var(--primary);" onclick="atualizarStatus(${job.id}, 'em_andamento')">▶ Iniciar</button>
                            <button class="btn-cancel" onclick="atualizarStatus(${job.id}, 'cancelado')"><i class="fa-solid fa-xmark"></i> Cancelar</button>
                        `;
                    } else if (job.status === 'em_andamento') {
                        botao = `
                            <button class="btn-action" style="background:var(--success);" onclick="atualizarStatus(${job.id}, 'impresso')">✔ Concluir</button>
                            <button class="btn-cancel" onclick="atualizarStatus(${job.id}, 'cancelado')"><i class="fa-solid fa-xmark"></i> Cancelar</button>
                        `;
                    }

                    const obsHtml = job.observacao ? `<div class="obs-text">"${job.observacao}"</div>` : '<span style="color:#ccc;">-</span>';

                    tr.innerHTML = `
                        <td><span style="color:#aaa;">#</span>${job.id}</td>
                        <td><strong>${job.solicitante}</strong><br><small style="color:#777;">${job.setor}</small></td>
                        <td>${htmlArquivos}</td>
                        <td>
                            <div style="font-weight:600;">${job.copies} cópia(s)</div>
                            <small style="color:#666;">Modo: ${job.color_mode}</small><br>
                            <small style="color:#666;">Páginas: ${job.total_pages || '-'}</small><br>
                            <small style="color:var(--primary); font-weight:700;">Total: ${job.total_printed || '-'}</small>
                        </td>
                        <td>${prazoHtml}</td>
                        <td style="max-width: 150px;">${obsHtml}</td>
                        <td style="text-align:center;">
                            <span class="status-tag status-${statusClass}" style="margin-bottom:8px;">${statusLabel}</span><br>
                            ${botao}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) { console.error("Erro ao carregar tabela:", err); }
        }

        async function atualizarStatus(id, novoStatus) {
            const btn = event.target;
            btn.disabled = true;
            try {
                const res = await fetch(`/api/print/jobs/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'user-id': userData.id },
                    body: JSON.stringify({ status: novoStatus })
                });
                if(res.ok) carregarTudo();
                else alert('Erro ao atualizar status');
            } catch(e) { alert('Erro de conexão'); }
            finally { btn.disabled = false; }
        }

        let chart1, chart2;
        async function carregarGraficos() {
             try {
                const start = document.getElementById('filterStartDate').value;
                const end = document.getElementById('filterEndDate').value;
                const params = new URLSearchParams({ status: currentTab, start_date: start, end_date: end });

                const res = await fetch(`/api/print/stats?${params}`, { headers: { 'user-id': userData.id } });
                const data = await res.json();
                
                const ctx1 = document.getElementById('chartSetor').getContext('2d');
                if(chart1) chart1.destroy();
                chart1 = new Chart(ctx1, { 
                    type: 'doughnut', 
                    data: { 
                        labels: data.porSetor.map(d => d.label), 
                        datasets: [{ 
                            data: data.porSetor.map(d => d.total), 
                            backgroundColor: ['#0d6efd', '#198754', '#ffc107', '#dc3545', '#6610f2', '#fd7e14'] 
                        }] 
                    },
                    options: { plugins: { legend: { position: 'right', labels: { boxWidth: 12, font: { size: 10 } } } } }
                });

                const ctx2 = document.getElementById('chartUsuario').getContext('2d');
                if(chart2) chart2.destroy();
                chart2 = new Chart(ctx2, { 
                    type: 'bar', 
                    data: { 
                        labels: data.porUsuario.map(d => d.label), 
                        datasets: [{ 
                            label: 'Total Pedidos', 
                            data: data.porUsuario.map(d => d.total), 
                            backgroundColor: '#0d6efd',
                            borderRadius: 5
                        }] 
                    },
                    options: { scales: { y: { beginAtZero: true, grid: { display: false } }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
                });
                
                // Atualizar Cota de Impressão
                const totalCota = 1000;
                const atual = data.cota || 0;
                const percent = Math.min((atual / totalCota) * 100, 100).toFixed(1);
                
                document.getElementById('quotaBar').style.width = percent + '%';
                document.getElementById('quotaText').innerText = `${atual} / ${totalCota}`;
                document.getElementById('quotaPercent').innerText = percent + '%';
                
                if (atual > totalCota) document.getElementById('quotaBar').style.background = 'var(--danger)';
                else if (atual > 800) document.getElementById('quotaBar').style.background = 'var(--warning)';
            } catch(e) {}
        }
        
        async function baixarExcel() {
            const start = document.getElementById('filterStartDate').value;
            const end = document.getElementById('filterEndDate').value;
            const params = new URLSearchParams({ status: currentTab, start_date: start, end_date: end });
            
            const res = await fetch(`/api/print/report?${params}`, { headers: { 'user-id': userData.id } });
            if(res.ok) {
                const blob = await res.blob();
                const link = document.createElement('a');
                link.href = window.URL.createObjectURL(blob);
                link.download = `Relatorio_Filtrado_${new Date().toISOString().slice(0,10)}.xlsx`;
                link.click();
            }
        }

        carregarTudo();
        setInterval(carregarTudo, 30000);
    </script>
</body>
</html>

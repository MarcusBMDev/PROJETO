<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NeuroChat</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login-card">
        <h2>NeuroChat 🧠</h2>
        
        <input type="text" id="username" placeholder="Usuário" onkeypress="handleEnter(event)">
        <input type="password" id="password" placeholder="Senha" onkeypress="handleEnter(event)">
        <button onclick="login()">Entrar</button>

        <div class="error-msg" id="error-msg"></div>

        <p class="footer-text">Comunicação Interna Segura</p>
        
    </div>

    <script>
        // Lógica de Login e Registro
        
        // AUTO-LOGIN: Se já tiver sessão, vai direto pro chat
        (function checkLogin() {
            const session = localStorage.getItem('neurochat_user');
            if (session) {
                try {
                    const user = JSON.parse(session);
                    if (user && user.id) {
                        window.location.href = '/chat.html';
                    }
                } catch (e) {
                    localStorage.removeItem('neurochat_user'); // Limpa se estiver quebrado
                }
            }
        })();

        function handleEnter(e) { if(e.key === 'Enter') login(); }

        async function loadDepartments() {
            try {
                const res = await fetch('/api/departments');
                const depts = await res.json();
                const select = document.getElementById('reg-department');
                select.innerHTML = '<option value="" disabled selected>Selecione seu Departamento</option>';
                
                depts.forEach(cat => {
                    const group = document.createElement('optgroup');
                    group.label = cat.category;
                    cat.departments.forEach(d => {
                        const opt = document.createElement('option');
                        opt.value = d;
                        opt.textContent = d;
                        group.appendChild(opt);
                    });
                    select.appendChild(group);
                });
            } catch (error) {
                console.error("Erro ao carregar departamentos:", error);
                document.getElementById('reg-department').innerHTML = '<option value="">Erro ao carregar lista</option>';
            }
        }

        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const err = document.getElementById('error-msg');
            const btn = document.querySelector('button');

            if(!u || !p) { err.style.display='block'; err.textContent="Preencha todos os campos."; return; }

            btn.textContent = "Entrando...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();

                if(data.success || data.sucesso) {
                    localStorage.setItem('neurochat_user', JSON.stringify(data));
                    window.location.href = '/chat.html';
                } else {
                    err.style.display='block';
                    err.textContent = data.message || "Login falhou.";
                    btn.textContent = "Entrar";
                    btn.disabled = false;
                }
            } catch(e) {
                console.error(e);
                err.style.display='block';
                err.textContent = "Erro de conexão.";
                btn.textContent = "Entrar";
                btn.disabled = false;
            }
        }

    </script>
</body>
</html>
